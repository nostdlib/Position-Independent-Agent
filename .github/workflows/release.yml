name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0)"
        required: true
        type: string

env:
  LLVM_VERSION: "22.1.0"

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - { platform: windows, arch: i386,    ext: exe }
          - { platform: windows, arch: x86_64,  ext: exe }
          - { platform: windows, arch: aarch64, ext: exe }
          - { platform: windows, arch: armv7a,  ext: exe }
          # Windows (no-syscall: direct ntdll exports)
          - { platform: windows, arch: i386,    ext: exe, variant: nosyscall, cmake_extra: "-DNO_SYSCALL=ON" }
          - { platform: windows, arch: x86_64,  ext: exe, variant: nosyscall, cmake_extra: "-DNO_SYSCALL=ON" }
          - { platform: windows, arch: aarch64, ext: exe, variant: nosyscall, cmake_extra: "-DNO_SYSCALL=ON" }
          - { platform: windows, arch: armv7a,  ext: exe, variant: nosyscall, cmake_extra: "-DNO_SYSCALL=ON" }
          # Linux
          - { platform: linux, arch: i386,    ext: elf }
          - { platform: linux, arch: x86_64,  ext: elf }
          - { platform: linux, arch: armv7a,  ext: elf }
          - { platform: linux, arch: aarch64, ext: elf }
          - { platform: linux, arch: riscv32, ext: elf }
          - { platform: linux, arch: riscv64, ext: elf }
          - { platform: linux, arch: mips64,  ext: elf }
          # macOS
          - { platform: macos, arch: x86_64,  ext: "" }
          - { platform: macos, arch: aarch64, ext: "" }
          # UEFI
          - { platform: uefi, arch: x86_64,  ext: efi }
          - { platform: uefi, arch: aarch64, ext: efi }
          # FreeBSD
          - { platform: freebsd, arch: i386,    ext: elf }
          - { platform: freebsd, arch: x86_64,  ext: elf }
          - { platform: freebsd, arch: aarch64, ext: elf }
          - { platform: freebsd, arch: riscv64, ext: elf }
          # Solaris
          - { platform: solaris, arch: i386,    ext: elf }
          - { platform: solaris, arch: x86_64,  ext: elf }
          - { platform: solaris, arch: aarch64, ext: elf }
          # Android
          - { platform: android, arch: x86_64,  ext: elf }
          - { platform: android, arch: armv7a,  ext: elf }
          - { platform: android, arch: aarch64, ext: elf }
          # iOS
          - { platform: ios, arch: aarch64, ext: "" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: /opt/llvm
          key: llvm-${{ env.LLVM_VERSION }}-linux-x64

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Install LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          ver="${{ env.LLVM_VERSION }}"
          tarball="LLVM-${ver}-Linux-X64.tar.xz"
          url="https://github.com/llvm/llvm-project/releases/download/llvmorg-${ver}/${tarball}"
          curl -fSL "$url" -o "$tarball"
          sudo mkdir -p /opt/llvm
          sudo tar -xf "$tarball" --strip-components=1 -C /opt/llvm
          rm "$tarball"

      - name: Add LLVM to PATH
        run: echo "/opt/llvm/bin" >> "$GITHUB_PATH"

      - name: Build with -Oz
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          COMMIT_HASH=$(git rev-parse --short=8 HEAD)
          cmake --preset ${{ matrix.platform }}-${{ matrix.arch }}-release -DOPTIMIZATION_LEVEL=Oz -DBUILD_NUMBER=${BUILD_NUMBER} -DCOMMIT_HASH=${COMMIT_HASH} ${{ matrix.cmake_extra }}
          cmake --build --preset ${{ matrix.platform }}-${{ matrix.arch }}-release

      - name: Rename artifacts
        run: |
          ext="${{ matrix.ext }}"
          variant="${{ matrix.variant }}"
          name="${{ matrix.platform }}-${{ matrix.arch }}${variant:+-$variant}"
          mkdir -p artifacts

          # Find and rename the main executable
          if [ -z "$ext" ]; then
            main_file=$(find build -name "output" -type f | head -n 1)
            [ -n "$main_file" ] && cp "$main_file" "artifacts/$name"
          else
            main_file=$(find build -name "output.${ext}" -type f | head -n 1)
            [ -n "$main_file" ] && cp "$main_file" "artifacts/$name.$ext"
          fi

          # Find and rename the .bin (raw shellcode)
          bin_file=$(find build -name "output.bin" -type f | head -n 1)
          [ -n "$bin_file" ] && cp "$bin_file" "artifacts/$name.bin"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.variant && format('-{0}', matrix.variant) || '' }}
          retention-days: 1
          path: artifacts/

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          echo "Release files:"
          ls -lh release-files/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-files/* --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              release-files/*
          fi
